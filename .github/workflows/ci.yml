# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — runs on every push and PR
#
# Jobs:
#   1. lint-and-typecheck — Fast feedback on type errors
#   2. unit-tests         — API unit tests (no DB needed)
#   3. e2e-tests-api      — API e2e tests (needs Postgres)
#   4. e2e-tests-web      — Playwright browser tests (needs Postgres + both servers)
#   5. docker-build       — Verify Dockerfiles build successfully
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  # ── Type checking ──────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @paisa/config build
          pnpm --filter @paisa/shared build
          pnpm --filter @paisa/db build

      - name: Typecheck API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Typecheck Web
        working-directory: apps/web
        run: npx nuxi typecheck

  # ── Unit tests (no DB needed) ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @paisa/config build
          pnpm --filter @paisa/shared build
          pnpm --filter @paisa/db build

      - name: Run unit tests
        run: pnpm --filter @paisa/api test

  # ── API e2e tests (needs Postgres) ────────────────────────────────────────
  e2e-tests-api:
    name: API E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: paisa_test
          POSTGRES_PASSWORD: paisa_test
          POSTGRES_DB: paisa_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U paisa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @paisa/config build
          pnpm --filter @paisa/shared build
          pnpm --filter @paisa/db build

      - name: Run migrations
        run: pnpm --filter @paisa/db db:migrate:deploy
        env:
          DATABASE_URL: postgresql://paisa_test:paisa_test@localhost:5433/paisa_test

      - name: Run API e2e tests
        run: pnpm --filter @paisa/api test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://paisa_test:paisa_test@localhost:5433/paisa_test
          DATABASE_URL_TEST: postgresql://paisa_test:paisa_test@localhost:5433/paisa_test
          API_PORT: 3001
          API_BASE_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3000
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          LOG_LEVEL: silent
          WEBAUTHN_RP_NAME: Paisa Test
          WEBAUTHN_RP_ID: localhost
          WEBAUTHN_ORIGIN: http://localhost:3000
          FEATURE_STRIPE_ENABLED: 'true'
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
          STRIPE_PUBLISHABLE_KEY: pk_test_fake

  # ── Playwright e2e tests (needs Postgres + both servers) ──────────────────
  e2e-tests-web:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: paisa_test
          POSTGRES_PASSWORD: paisa_test
          POSTGRES_DB: paisa_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U paisa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build packages
        run: |
          pnpm --filter @paisa/config build
          pnpm --filter @paisa/shared build
          pnpm --filter @paisa/db build

      - name: Run Playwright tests
        run: pnpm test:e2e:web
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://paisa_test:paisa_test@localhost:5433/paisa_test
          DATABASE_URL_TEST: postgresql://paisa_test:paisa_test@localhost:5433/paisa_test
          API_PORT: 3001
          API_BASE_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3000
          NUXT_PUBLIC_API_BASE_URL: http://localhost:3001
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          LOG_LEVEL: silent
          WEBAUTHN_RP_NAME: Paisa Test
          WEBAUTHN_RP_ID: localhost
          WEBAUTHN_ORIGIN: http://localhost:3000
          FEATURE_STRIPE_ENABLED: 'true'
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
          STRIPE_PUBLISHABLE_KEY: pk_test_fake

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ── Docker build verification ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t paisa-api .

      - name: Build Web image
        run: docker build -f docker/Dockerfile.web -t paisa-web .
