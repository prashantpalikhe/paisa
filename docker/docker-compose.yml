# Local development infrastructure only.
# Application code (NestJS, Nuxt) runs natively via `pnpm dev`.

services:
  postgres:
    image: postgres:17
    container_name: paisa-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: paisa
      POSTGRES_PASSWORD: paisa
      POSTGRES_DB: paisa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paisa']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paisa-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: paisa-rabbitmq
    ports:
      - '5672:5672'   # AMQP
      - '15672:15672' # Management UI: http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
